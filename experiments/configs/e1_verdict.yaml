experiment:
  id: e1_verdict
  name: "E1: Verdict Soundness and Power"
  description: "Validate Type I error <= alpha and regression detection power"

models:
  - name: gpt-5.2-chat
    subscription: 1
  - name: claude-sonnet-4-6
    subscription: 3
  - name: Mistral-Large-3
    subscription: 1
  - name: Llama-4-Maverick-17B-128E-Instruct-FP8
    subscription: 3
  - name: Phi-4
    subscription: 2

scenarios:
  - ecommerce
  - customer_support
  - code_generation

parameters:
  baseline_trials: 100
  candidate_trials: 100
  alpha_levels: [0.01, 0.05, 0.10]
  bootstrap_iterations: 1000
  regression_injection: true
  regression_type: "prompt_degradation"

output:
  results_dir: experiments/results/e1/
  figures_dir: experiments/figures/e1/
