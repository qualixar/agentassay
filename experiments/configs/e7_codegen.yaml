experiment:
  id: e7_codegen
  name: "E7: Token-Efficient Testing - Code Generation"
  description: "E7 for code_generation scenario with 4 fast models"

models:
  - name: gpt-5.2-chat
    subscription: 1
  - name: claude-sonnet-4-6
    subscription: 1
  - name: Mistral-Large-3
    subscription: 1
  - name: Llama-4-Maverick-17B-128E-Instruct-FP8
    subscription: 3

scenarios:
  - code_generation

parameters:
  approaches:
    - name: "fixed_n"
      description: "Baseline: fixed N=100 trials"
      trials: 100
      use_fingerprinting: false
      use_adaptive_budget: false
      use_trace_first: false
    - name: "sprt_only"
      description: "Sequential stopping only"
      max_trials: 200
      use_sprt: true
      use_fingerprinting: false
      use_adaptive_budget: false
    - name: "sprt_fingerprint"
      description: "SPRT with Hotelling T2 on fingerprints"
      max_trials: 200
      use_sprt: true
      use_fingerprinting: true
      use_adaptive_budget: false
    - name: "sprt_fp_budget"
      description: "SPRT + fingerprinting + adaptive budget"
      calibration_size: 10
      use_sprt: true
      use_fingerprinting: true
      use_adaptive_budget: true
    - name: "full_system"
      description: "All pillars"
      calibration_size: 10
      use_sprt: true
      use_fingerprinting: true
      use_adaptive_budget: true
      use_trace_first: true

  repetitions: 25
  alpha: 0.05
  beta: 0.10
  delta: 0.10

output:
  results_dir: experiments/results/e7_efficiency/
  figures_dir: experiments/figures/e7/
