experiment:
  id: e3_mutation
  name: "E3: Mutation Score Analysis"
  description: "Characterize mutation landscape for AI agents"

models:
  - name: gpt-5.2-chat
    subscription: 1
  - name: claude-sonnet-4-6
    subscription: 3
  - name: Mistral-Large-3
    subscription: 1
  - name: Llama-4-Maverick-17B-128E-Instruct-FP8
    subscription: 3
  - name: Phi-4
    subscription: 2

scenarios:
  - ecommerce
  - customer_support
  - code_generation

parameters:
  mutants_per_operator_class: 20
  operator_classes: [prompt, tool, model, context]
  trials_per_mutant: 30
  kill_threshold: 0.05

output:
  results_dir: experiments/results/e3/
  figures_dir: experiments/figures/e3/
