experiment:
  id: e5_metamorphic
  name: "E5: Metamorphic Relation Effectiveness"
  description: "MRs detect additional faults beyond standard pass/fail testing"

models:
  - name: gpt-5.2-chat
    subscription: 1
  - name: claude-sonnet-4-6
    subscription: 3
  - name: Mistral-Large-3
    subscription: 1
  - name: Llama-4-Maverick-17B-128E-Instruct-FP8
    subscription: 3
  - name: Phi-4
    subscription: 2

scenarios:
  - ecommerce
  - customer_support
  - code_generation

parameters:
  mr_families:
    - permutation
    - perturbation
    - composition
    - oracle
  trials_per_relation: 50
  mutation_injection: true
  mutants_per_scenario: 20
  baseline_evaluator_only: true

output:
  results_dir: experiments/results/e5/
  figures_dir: experiments/figures/e5/
