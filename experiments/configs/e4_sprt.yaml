experiment:
  id: e4_sprt
  name: "E4: SPRT Efficiency"
  description: "SPRT achieves same error guarantees with fewer trials"

models:
  - name: gpt-5.2-chat
    subscription: 1
  - name: claude-sonnet-4-6
    subscription: 3
  - name: Mistral-Large-3
    subscription: 1
  - name: Llama-4-Maverick-17B-128E-Instruct-FP8
    subscription: 3
  - name: Phi-4
    subscription: 2

scenarios:
  - ecommerce
  - customer_support
  - code_generation

parameters:
  alpha: 0.05
  beta: 0.10
  delta: 0.10
  fixed_n_sizes: [50, 100, 200]
  max_sprt_trials: 500
  repetitions: 50

output:
  results_dir: experiments/results/e4/
  figures_dir: experiments/figures/e4/
