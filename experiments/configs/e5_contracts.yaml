# =============================================================================
# Experiment E5: Contract Integration
# =============================================================================
#
# Validates the bridge between AgentAssert (behavioral contracts) and
# AgentAssay (regression testing). Contracts serve as test oracles.
#
# Methodology:
#   - Define behavioral contracts for each scenario (ContractSpec YAML)
#   - Use ContractOracle as the evaluator for trial results
#   - Compare contract-based verdicts vs. custom evaluator verdicts
#   - Measure contract sensitivity to known regressions
#
# Expected results:
#   - Contract verdicts agree with custom evaluators >= 90%
#   - Contracts detect regressions with comparable power
#   - Contracts provide richer violation details (constraint-level)
#   - No false negatives from contract evaluation (safety property)
#
# Paper reference: Section 8.5, Table 7
# =============================================================================

experiment:
  id: e5_contracts
  name: "Contract Integration"
  description: >
    Validate that AgentAssert behavioral contracts serve as effective
    test oracles for regression testing. Compare contract-based verdicts
    against scenario-specific custom evaluators.
  paper_section: "8.5"
  paper_table: 7

models:
  - name: gpt-5.2-chat
    provider: openai
    subscription_tier: 1
  - name: claude-sonnet-4-6
    provider: anthropic
    subscription_tier: 3
  - name: Mistral-Large-3
    provider: mistral
    subscription_tier: 1
  - name: Llama-4-Maverick-17B-128E-Instruct-FP8
    provider: meta
    subscription_tier: 3
  - name: Phi-4
    provider: microsoft
    subscription_tier: 2

scenarios:
  - ecommerce
  - customer_support
  - code_generation

parameters:
  # Trials per scenario for comparison
  trials_per_scenario: 50

  # Contract files (to be created alongside experiments)
  contracts:
    ecommerce: experiments/contracts/ecommerce_contract.yaml
    customer_support: experiments/contracts/customer_support_contract.yaml
    code_generation: experiments/contracts/code_generation_contract.yaml
    financial_compliance: experiments/contracts/financial_compliance_contract.yaml

  # Agreement threshold for validation
  agreement_threshold: 0.90

  # Regression injections per scenario
  regressions_per_scenario: 4

  # Compare methods
  comparison_metrics:
    - agreement_rate
    - false_negative_rate
    - false_positive_rate
    - violation_detail_richness

  # Seed
  seed: 42

budget:
  max_cost_usd: 18.00
  estimated_cost_usd: 14.00
  estimated_api_calls: 1500

output:
  results_dir: experiments/results/e5/
  figures_dir: experiments/figures/e5/
  report_file: experiments/results/e5/e5_report.json
