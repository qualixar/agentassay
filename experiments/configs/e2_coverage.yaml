experiment:
  id: e2_coverage
  name: "E2: Coverage and Fault Detection"
  description: "Validate higher coverage correlates with higher fault detection"

models:
  - name: gpt-5.2-chat
    subscription: 1
  - name: claude-sonnet-4-6
    subscription: 3
  - name: Mistral-Large-3
    subscription: 1
  - name: Llama-4-Maverick-17B-128E-Instruct-FP8
    subscription: 3
  - name: Phi-4
    subscription: 2

scenarios:
  - ecommerce
  - customer_support
  - code_generation

parameters:
  mutants_per_agent: 50
  suite_sizes: [5, 10, 20, 50, 100]
  trials_per_suite: 20

output:
  results_dir: experiments/results/e2/
  figures_dir: experiments/figures/e2/
